version: "3.4"

services:
  # nosemgrep: writable-filesystem-service
  laalandingpage:
    image: laalandingpage
    build:
      context: .
      dockerfile: ./Dockerfile
    environment:
      JAVA_OPTS: -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=5005,quiet=y
    ports:
      - 8080:8080
      - 5005:5005
    security_opt:
      - no-new-privileges:true
