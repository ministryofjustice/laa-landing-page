apiVersion: batch/v1
kind: Job
metadata:
  name: zap-scan
  namespace: ${NAMESPACE}
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 3
  template:
    spec:
      containers:
        - name: zap
          image: ghcr.io/zaproxy/zaproxy:stable
          volumeMounts:
            - name: zap-wrk
              mountPath: /zap/wrk
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
          command:
            - /bin/sh
            - -c
          args:
            - |
              zap-baseline.py \
                -t http://laa-landing-page.${NAMESPACE}.svc.cluster.local:8080 \
                -I \
                -a \
                -j \
                -r report.html
              STATUS=$?
              if [ "$STATUS" -ne 0 ]; then
                echo "ZAP baseline failed with status $STATUS" >&2
                exit "$STATUS"
              fi
              echo "ZAP report written to /zap/wrk/report.html"
              sleep 30
      volumes:
        - name: zap-wrk
          emptyDir: {}
      restartPolicy: Never
