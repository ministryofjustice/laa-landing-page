spring.application.name=laa-silas

# User API base URL
user.api.base-url=${USER_API_BASE_URL:http://localhost:8080}

# Azure AD / Entra ID Configuration
azure.tenant-id=${AZURE_TENANT_ID}
azure.client-id=${AZURE_CLIENT_ID}
azure.client-secret=${AZURE_CLIENT_SECRET}
microsoft.graph.scope=https://graph.microsoft.com/.default

# Internal user group polling
internal.user.polling.enabled=${POLLING_ENABLED:false}
internal.user.polling.schedule=${POLLING_SCHEDULE:0 10 * * * *}
internal.user.polling.group.id=${POLLING_GROUP_ID}

# OPA (Open Policy Agent) configuration
opa.base-url=${OPA_BASE_URL:http://localhost:8181}

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.uk.gov.justice.laa.portal.silas=${LOG_LEVEL:INFO}

# Server port
server.port=${POLLING_SERVICE_PORT:8081}
