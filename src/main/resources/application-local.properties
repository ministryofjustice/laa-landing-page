# Override secure=true false for localhost
server.servlet.session.cookie.secure=false

# Override issuer-uri to avoid OIDC discovery network call at startup.
# All endpoints are specified explicitly so Spring skips the .well-known/openid-configuration fetch.
spring.security.oauth2.client.provider.azure.issuer-uri=
spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.user-name-attribute=sub
