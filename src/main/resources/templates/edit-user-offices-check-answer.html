<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(
      title=~{::title},
      mainContent=~{::#main-content},
      pageCategory=${'edit-user'},
      breadcrumbs=~{::#breadcrumbs})}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <title>Edit - Offices</title>
</head>

<body>
    <nav aria-label="Breadcrumb" class="govuk-breadcrumbs" id="breadcrumbs">
        <a class="govuk-back-link" th:href="@{/admin/users/edit/{id}/offices(id=${user.id})}">
            Back </a>
    </nav>
    <main class="govuk-main-wrapper" id="main-content">
        <form method="post" th:action="@{/admin/users/edit/{id}/offices-check-answer(id=${user.id})}">
            <h1 class="govuk-heading-l">
                Check your answers and confirm
            </h1>
            <div class="govuk-summary-card">
                <div class="govuk-summary-card__title-wrapper">
                    <h2 class="govuk-summary-card__title">
                        Offices
                    </h2>
                    <ul class="govuk-summary-card__actions">
                        <li class="govuk-summary-card__action">
                            <a th:href="@{/admin/users/edit/{id}/offices(id=${user.id})}" class="govuk-link">
                                Change
                                <span class="govuk-visually-hidden"> offices</span>
                            </a>
                        </li>
                    </ul>
                </div>
                <div class="govuk-summary-card__content">
                    <dl class="govuk-summary-list" th:if="${userOffices != null and !userOffices.isEmpty()}">
                        <div th:each="entry : ${officesByCity}" class="govuk-summary-list__row">
                            <dt class="govuk-summary-list__key" th:text="${entry.key}"></dt>
                            <dd class="govuk-summary-list__value">
                                <div th:each="office : ${entry.value}">
                                    <span th:text="${office.address?.formattedAddress ?: 'Unknown'}"></span>
                                    (<span th:text="${office.code}"></span>)
                                </div>
                            </dd>
                        </div>
                    </dl>
                    <div class="govuk-summary-list" th:if="${(userOffices == null or userOffices.isEmpty())}">
                        <div class="govuk-summary-list__row" th:if="${hasAllOffices}">
                            <dd class="govuk-summary-list__value">
                                <span>Access to All Offices</span>
                            </dd>
                        </div>
                        <div class="govuk-summary-list__row" th:if="${hasNoOffices}">
                            <dd class="govuk-summary-list__value">
                                <span>No Office Access</span>
                            </dd>
                        </div>
                    </div>
                </div>
            </div>
            <h2 class="govuk-heading-m">Confirm access and permissions</h2>
            <p class="govuk-body">When you confirm, the user will get access to the chosen offices.
            </p>
            <div class="govuk-button-group">
                <button type="submit" class="govuk-button" data-module="govuk-button" data-prevent-double-click="true">Confirm</button>
                <a th:href="@{/admin/users/edit/{id}/cancel/offices/confirmation(id=${user.id})}" class="govuk-link">Cancel</a>
            </div>
        </form>
    </main>
</body>

</html>
