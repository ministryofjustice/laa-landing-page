<!DOCTYPE html>
<html lang="en" th:replace="~{layout :: layout(
      title=~{::title},
      mainContent=~{::#main-content},
      pageCategory=${'edit-user'},
      breadcrumbs=~{::#breadcrumbs})}" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">

<head>
    <title>Edit - Roles</title>
</head>

<body>
<nav aria-label="Breadcrumb" class="govuk-breadcrumbs" id="breadcrumbs">
    <a class="govuk-back-link" th:href="${backUrl}">
        Back </a>
</nav>
<main class="govuk-main-wrapper" id="main-content">
    <form method="post" th:action="@{/admin/users/edit/{id}/roles-check-answer(id=${user.id})}">
        <h1 class="govuk-heading-l">
            Check your answers and confirm
        </h1>
        <div th:if="${errorMessage}">
            <div class="govuk-error-summary" role="alert" aria-labelledby="error-summary-title"
                 aria-describedby="error-summary-description" data-module="govuk-error-summary">
                <h2 class="govuk-error-summary__title" id="error-summary-title">
                    There is a problem
                </h2>
                <div class="govuk-error-summary__body" id="error-summary-description">
                    <ul th:if="${errorMessage}" class="govuk-list govuk-error-summary__list">
                        <li><a href="#" th:text="${errorMessage}"></a></li>
                    </ul>
                </div>
            </div>
        </div>
        <div class="govuk-summary-card">
            <div class="govuk-summary-card__title-wrapper">
                <h2 class="govuk-summary-card__title">
                    Services
                </h2>
                <a th:href="@{/admin/users/edit/{id}/apps(id=${user.id})}" class="govuk-link">
                    Change
                </a>
            </div>
            <div class="govuk-summary-card__content">
                <dl class="govuk-summary-list">
                    <div class="govuk-summary-list__row" th:if="${selectedAuthzApps != null and !selectedAuthzApps.isEmpty()}">
                        <dd class="govuk-summary-list__key">
                            <span>Admin Services</span>
                        </dd>
                        <dd class="govuk-summary-list__value">
                            <div th:each="app : ${selectedAuthzApps}">
                                <span th:text="${app}"></span>
                            </div>
                        </dd>
                    </div>
                    <div class="govuk-summary-list__row" th:if="${selectedNonAuthzApps != null and !selectedNonAuthzApps.isEmpty()}">
                        <dd class="govuk-summary-list__key">
                            <span>Legal Aid Services</span>
                        </dd>
                        <dd class="govuk-summary-list__value">
                            <div th:each="app : ${selectedNonAuthzApps}">
                                <span th:text="${app}"></span>
                            </div>
                        </dd>
                    </div>
                </dl>
                <div class="govuk-summary-list" th:if="${(selectedAppRolesGrouped == null or selectedAppRolesGrouped.isEmpty())}">
                    <div class="govuk-summary-list__row">
                        <dd class="govuk-summary-list__value">
                            <span>No role assigned</span>
                        </dd>
                        <dd class="govuk-summary-list__actions">
                            <a th:href="@{/admin/users/edit/{id}/apps(id=${user.id})}" class="govuk-link">
                                Change
                                <span class="govuk-visually-hidden"> role</span>
                            </a>
                        </dd>
                    </div>
                </div>
            </div>
        </div>
        <div class="govuk-summary-card">
            <div class="govuk-summary-card__title-wrapper">
                <h2 class="govuk-summary-card__title">
                    Roles
                </h2>
            </div>
            <div class="govuk-summary-card__content">
                <dl class="govuk-summary-list" th:if="${selectedAppRolesGrouped != null and !selectedAppRolesGrouped.isEmpty()}">
                    <div th:each="app : ${selectedAppRolesGrouped.keySet()}" class="govuk-summary-list__row">
                        <dd class="govuk-summary-list__key">
                            <span th:text="${app}"></span>
                        </dd>
                        <dd class="govuk-summary-list__value">
                            <div th:each="appRole : ${selectedAppRolesGrouped.get(app)}">
                                <span th:text="${appRole.getRoleName()}"></span>
                            </div>
                        </dd>
                        <dd th:if="${selectedAppRolesGrouped.get(app).getFirst().getTotalAppRoles() > 1}" class="govuk-summary-list__actions">
                            <a th:href="@{${selectedAppRolesGrouped.get(app).getFirst().getUrl()}}" class="govuk-link">
                                Change
                                <span class="govuk-visually-hidden"> role</span>
                            </a>
                        </dd>
                    </div>
                </dl>
                <div class="govuk-summary-list" th:if="${(selectedAppRolesGrouped == null or selectedAppRolesGrouped.isEmpty())}">
                    <div class="govuk-summary-list__row">
                        <dd class="govuk-summary-list__value">
                            <span>No role assigned</span>
                        </dd>
                        <dd class="govuk-summary-list__actions">
                            <a th:href="@{/admin/users/edit/{id}/apps(id=${user.id})}" class="govuk-link">
                                Change
                                <span class="govuk-visually-hidden"> role</span>
                            </a>
                        </dd>
                    </div>
                </div>
            </div>
        </div>
        <h2 class="govuk-heading-m">Confirm access and permissions</h2>
        <p class="govuk-body">When you confirm, the user will get access to the chosen services.
        </p>
        <div class="govuk-button-group">
            <button type="submit" th:disabled="${errorMessage != null}" class="govuk-button" data-module="govuk-button" onclick="this.disabled=true; this.form.submit();">Confirm</button>
            <a th:href="@{/admin/users/edit/{id}/cancel/confirmation(id=${user.id})}" class="govuk-link">Cancel</a>
        </div>
    </form>
</main>
</body>

</html>
