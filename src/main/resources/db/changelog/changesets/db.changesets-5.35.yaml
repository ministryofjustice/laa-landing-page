databaseChangeLog:
  - changeSet:
      id: 1742107080-1
      author: sankavi.mohanraj
      dbms: postgresql
      comment: Update invitation_status check constraint to include CODE_EXPIRED and MAX_VERIFICATION_ATTEMPTS
      changes:
        - sql:
            dbms: postgresql
            sql: "ALTER TABLE entra_user DROP CONSTRAINT IF EXISTS entra_user_invitation_status_check"
        - sql:
            dbms: postgresql
            sql: "ALTER TABLE entra_user ADD CONSTRAINT entra_user_invitation_status_check CHECK ((invitation_status)::text = ANY ((ARRAY['INVITE_SENT'::character varying, 'AWAITING_MFA'::character varying, 'AWAITING_VERIFICATION'::character varying, 'VERIFICATION_SUCCESS'::character varying, 'CODE_EXPIRED'::character varying, 'MAX_VERIFICATION_ATTEMPTS'::character varying, 'VERIFICATION_FAILED'::character varying])::text[]))"
      rollback:
        - sql:
            dbms: postgresql
            sql: "ALTER TABLE entra_user DROP CONSTRAINT IF EXISTS entra_user_invitation_status_check"
        - sql:
            dbms: postgresql
            sql: "ALTER TABLE entra_user ADD CONSTRAINT entra_user_invitation_status_check CHECK ((invitation_status)::text = ANY ((ARRAY['INVITE_SENT'::character varying, 'AWAITING_MFA'::character varying, 'AWAITING_VERIFICATION'::character varying, 'VERIFICATION_SUCCESS'::character varying, 'VERIFICATION_FAILED'::character varying])::text[]))"
