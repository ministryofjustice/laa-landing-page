databaseChangeLog:
  - changeSet:
      id: add-additional-global-admin-roles-v1-20260306
      author: deborah.ojomo

      changes:

        - sql:
            splitStatements: true
            sql: |
              INSERT INTO role_permission (app_role_id, permission)
              VALUES 
                  ((SELECT id FROM app_role WHERE name = 'Global Admin'), 'VIEW_LAA_APP_METADATA'),
                  ((SELECT id FROM app_role WHERE name = 'Global Admin'), 'EDIT_LAA_APP_METADATA'),
                  ((SELECT id FROM app_role WHERE name = 'Global Admin'), 'TRIGGER_LAA_APP_SYNC'),
                  ((SELECT id FROM app_role WHERE name = 'Global Admin'), 'DELETE_LAA_APP_ROLE'),
                  ((SELECT id FROM app_role WHERE name = 'Global Admin'), 'CREATE_LAA_APP_ROLE');

      rollback:

        - sql:
            sql: |
              DELETE FROM role_permission
              WHERE permission IN ( 
              'VIEW_LAA_APP_METADATA', 
              'EDIT_LAA_APP_METADATA', 
              'TRIGGER_LAA_APP_SYNC',
              'DELETE_LAA_APP_ROLE', 
              'CREATE_LAA_APP_ROLE'
              )
                AND app_role_id = (
                    SELECT id FROM app_role 
                    WHERE name = 'Global Admin'
                );