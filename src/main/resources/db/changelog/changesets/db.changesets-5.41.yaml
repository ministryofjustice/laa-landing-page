databaseChangeLog:
  - changeSet:
      id: add-disable-type-to-entra-user
      author: stb-3994
      changes:
        - addColumn:
            tableName: entra_user
            columns:
              - column:
                  name: disable_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: entra_user
            columnName: disable_type

  - changeSet:
      id: add-disable-type-to-user-account-status-audit
      author: stb-3994
      changes:
        - addColumn:
            tableName: user_account_status_audit
            columns:
              - column:
                  name: disable_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: user_account_status_audit
            columnName: disable_type

  - changeSet:
      id: migrate-admin-app-apps-to-app-table-1
      author: Suresh Kavali

      changes:
        - sql:
            sql: |
              UPDATE app
              SET name = 'Manage your users',
                  description = 'Manage user access and permissions',
                  url = '/admin/users'
              WHERE lower(name) = lower('Manage Your Users');

        - sql:
            sql: |
              INSERT INTO app (id, name, description, url, app_type, security_group_oid, ordinal, enabled)
              SELECT gen_random_uuid(),
                     'SILAS System Administration',
                     'Manage admin services including user roles and permissions',
                     '/admin/silas-administration',
                     'AUTHZ',
                     'SILAS System Administration',
                     1,
                     true
              WHERE NOT EXISTS (
                SELECT 1 FROM app WHERE name = 'SILAS System Administration'
              );

        - sql:
            sql: |
              INSERT INTO app (id, name, description, url, app_type, security_group_oid, ordinal, enabled)
              SELECT gen_random_uuid(),
                     'User Access Audit Table',
                     'View all registered users including account status and role assignments',
                     '/admin/users/audit',
                     'AUTHZ',
                     'User Access Audit Table',
                     2,
                     true
              WHERE NOT EXISTS (
                SELECT 1 FROM app WHERE name = 'User Access Audit Table'
              );

        - sql:
            sql: |
              INSERT INTO app (id, name, description, url, app_type, security_group_oid, ordinal, enabled)
              SELECT gen_random_uuid(),
                     'Firm Directory',
                     'View all registered Firms',
                     '/admin/firmDirectory',
                     'AUTHZ',
                     'Firm Directory',
                     3,
                     true
              WHERE NOT EXISTS (
                SELECT 1 FROM app WHERE name = 'Firm Directory'
              );

        - dropTable:
            tableName: admin_app

      rollback:
        - createTable:
            tableName: admin_app
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: text
                  constraints:
                    nullable: false
              - column:
                  name: ordinal
                  type: int
                  defaultValueNumeric: "0"
                  constraints:
                    nullable: false
              - column:
                  name: enabled
                  type: boolean
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  constraints:
                    nullable: false

        - createIndex:
            indexName: AdminAppNameIdx
            tableName: admin_app
            columns:
              - column:
                  name: name

        - sql:
            sql: |
              INSERT INTO admin_app (id, name, description, ordinal, enabled) VALUES
                ('4b4e6fb2-9a7e-4ab1-a9fe-cdc1963080d4', 'Manage your users', 'Manage user access and permissions', 0, true),
                ('7edc36ac-d504-4b2f-a998-7cc7dd06af39', 'SiLAS Administration', 'Manage admin services including user roles and permissions', 1, true),
                ('00eae85f-1a38-4081-82f5-1ae9864b7072', 'User Access Audit Table', 'View all registered users including account status and role assignments', 2, true),
                ('12a59a6a-ddf5-4a53-a1a2-688cb526fa97', 'Firm Directory', 'View all registered Firms', 3, true);

        - sql:
            sql: |
              UPDATE app
              SET name = 'Manage Your Users',
                  description = 'Manage Your Users',
                  url = '#'
              WHERE lower(name) = lower('Manage your users');

  - changeSet:
      id: transfer-autz-roles-to-corresponding-apps-2
      author: Suresh Kavali

      changes:
        - sql:
            sql: |
              DELETE FROM user_profile_app_role
                WHERE app_role_id IN (SELECT id FROM app_role ar
                                      WHERE ar.name = 'SiLAS Administration');
        - sql:
            sql: |
              DELETE FROM role_permission
              WHERE app_role_id IN (SELECT id FROM app_role ar
                                WHERE ar.name = 'SiLAS Administration');
        - sql:
            sql: |
              DELETE FROM role_assignment 
              WHERE assignable_role_id IN (SELECT id FROM app_role ar
                                WHERE ar.name = 'SiLAS Administration')
              OR assigning_role_id IN (SELECT id FROM app_role ar
                                WHERE ar.name = 'SiLAS Administration');;
        - sql:
            sql: |
              DELETE FROM app_role ar
              WHERE ar.name = 'SiLAS Administration';

        - sql:
            sql: |
              UPDATE app_role
              SET app_id = (SELECT id FROM app WHERE name = 'SILAS System Administration')
              WHERE name = 'SILAS System Administration';

        - sql:
            sql: |
              UPDATE app_role
              SET app_id = (SELECT id FROM app WHERE name = 'User Access Audit Table')
              WHERE name = 'Audit Export';

        - sql:
            sql: |
              INSERT INTO app_role (id, app_id, authz_role, name, description, user_type_restriction, ordinal)
              SELECT gen_random_uuid(),
                     (SELECT id FROM app WHERE name = 'Firm Directory'),
                     true,
                     'Firm Directory Access',
                     'Firm Directory Access',
                     '{INTERNAL}',
                     0
              WHERE NOT EXISTS (
                SELECT 1 FROM app_role WHERE name = 'Firm Directory Access'
              );

        - sql:
            sql: |
              INSERT INTO role_permission (app_role_id, permission)
              SELECT id, 'VIEW_FIRM_DIRECTORY'
              FROM app_role
              WHERE name = 'Firm Directory Access'
              AND NOT EXISTS (
                SELECT 1
                FROM role_permission
                WHERE permission = 'VIEW_FIRM_DIRECTORY'
                AND app_role_id = app_role.id
              );

      rollback:
        - sql:
            sql: |
              DELETE FROM role_permission
              WHERE permission = 'VIEW_FIRM_DIRECTORY'
              AND app_role_id IN (
                SELECT id FROM app_role WHERE name = 'Firm Directory Access'
              );

        - sql:
            sql: |
              DELETE FROM app_role
              WHERE name = 'Firm Directory Access';

        - sql:
            sql: |
              UPDATE app_role
              SET app_id = (SELECT id FROM app WHERE lower(name) = lower('Manage Your Users'))
              WHERE name = 'Audit Export';

        - sql:
            sql: |
              UPDATE app_role
              SET app_id = (SELECT id FROM app WHERE lower(name) = lower('Manage Your Users'))
              WHERE name = 'SILAS System Administration';

  - changeSet:
      id: add-role-assignment-permission-for-firm-directory-3
      author: Suresh Kavali

      changes:
        - sql:
            sql: |
              INSERT INTO role_assignment (assigning_role_id, assignable_role_id)
              VALUES
              ((select id from app_role where name = 'Internal User Manager'), (select id from app_role where name = 'Firm Directory Access')),
              ((select id from app_role where name = 'Global Admin'), (select id from app_role where name = 'Firm Directory Access'));

      rollback:
        - sql:
            sql: |
              DELETE FROM role_assignment
              WHERE assigning_role_id IN (
                (SELECT id FROM app_role WHERE name = 'Internal User Manager'),
                (SELECT id FROM app_role WHERE name = 'Global Admin')
              ) AND assignable_role_id IN (
                SELECT id FROM app_role WHERE name = 'Firm Directory Access'
              );
