databaseChangeLog:
  - changeSet:
      id: add-disable-type-to-entra-user
      author: stb-3994
      changes:
        - addColumn:
            tableName: entra_user
            columns:
              - column:
                  name: disable_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: entra_user
            columnName: disable_type

  - changeSet:
      id: add-disable-type-to-user-account-status-audit
      author: stb-3994
      changes:
        - addColumn:
            tableName: user_account_status_audit
            columns:
              - column:
                  name: disable_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: user_account_status_audit
            columnName: disable_type
