databaseChangeLog:
  - changeSet:
      id: add-add-and-remove-role-permissions-external-internal
      author: suresh.kavali
      changes:
        - sql:
            dbms: postgresql
            sql: >
              INSERT INTO role_permission (app_role_id, permission) VALUES
                ((SELECT id FROM app_role WHERE name='Firm User Manager'), 'ASSIGN_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Firm User Manager'), 'REMOVE_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='External User Manager'), 'ASSIGN_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='External User Manager'), 'REMOVE_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='External User Admin'), 'ASSIGN_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='External User Admin'), 'REMOVE_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Global Admin'), 'ASSIGN_INTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Global Admin'), 'REMOVE_INTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Global Admin'), 'ASSIGN_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Global Admin'), 'REMOVE_EXTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Internal User Manager'), 'ASSIGN_INTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Internal User Manager'), 'REMOVE_INTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Security Response'), 'REMOVE_INTERNAL_USER_ROLES'),
                ((SELECT id FROM app_role WHERE name='Security Response'), 'REMOVE_EXTERNAL_USER_ROLES');
      rollback:
        - sql:
            dbms: postgresql
            sql: >
              DELETE FROM role_permission
                where app_role_id in (SELECT id FROM app_role WHERE name in ('Firm User Manager', 'External User Manager', 'External User Admin', 'Internal User Manager', 'Global Admin', 'Security Response'))
                and permission in ('ASSIGN_EXTERNAL_USER_ROLES', 'REMOVE_EXTERNAL_USER_ROLES', 'ASSIGN_INTERNAL_USER_ROLES', 'REMOVE_INTERNAL_USER_ROLES');

  - changeSet:
      id: remove-edit-permissions-for-security-response-role
      author: suresh.kavali
      changes:
        - sql:
            dbms: postgresql
            sql: >
              DELETE FROM role_permission
                where app_role_id = (SELECT id FROM app_role WHERE name='Security Response')
                and permission in ('EDIT_EXTERNAL_USER', 'EDIT_INTERNAL_USER', 'ENABLE_EXTERNAL_USER');
      rollback:
        - sql:
            dbms: postgresql
            sql: >
              INSERT INTO role_permission (app_role_id, permission) VALUES
                ((SELECT id FROM app_role WHERE name='Security Response'), 'EDIT_EXTERNAL_USER'),
                ((SELECT id FROM app_role WHERE name='Security Response'), 'EDIT_INTERNAL_USER'),
                ((SELECT id FROM app_role WHERE name='Security Response'), 'ENABLE_EXTERNAL_USER');
