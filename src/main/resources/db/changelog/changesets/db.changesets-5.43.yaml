databaseChangeLog:

  - changeSet:
      id: add-role-assignment-silas-admin-for-security-response
      author: Suresh Kavali

      changes:
        - sql:
            sql: |
              INSERT INTO role_assignment (assigning_role_id, assignable_role_id)
              SELECT
                sr.id AS assigning_role_id,
                ar.id AS assignable_role_id
              FROM app_role sr
              JOIN app_role ar
                ON ar.name = 'SILAS System Administration'
              WHERE sr.name = 'Security Response'
              AND NOT EXISTS (
                SELECT 1
                FROM role_assignment ra
                WHERE ra.assigning_role_id = sr.id
                  AND ra.assignable_role_id = ar.id
              );

      rollback:
        - sql:
            sql: |
              DELETE FROM role_assignment ra
              WHERE ra.assigning_role_id IN (
                SELECT ar.id
                FROM app_role ar
                WHERE ar.name = 'Security Response'
              )
              AND ra.assignable_role_id IN (
                SELECT ar.id
                FROM app_role ar
                WHERE ar.name = 'SILAS System Administration'
              );
