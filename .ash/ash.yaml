$schema: https://raw.githubusercontent.com/awslabs/automated-security-helper/refs/heads/main/automated_security_helper/schemas/AshConfig.json
project_name: laa-landing-page

build:
  build_mode: ONLINE

global_settings:
  severity_threshold: MEDIUM

  suppressions:
    - rule_id: "CKV_K8S_21" # The default namespace should be used.
      path: "**/*"
      reason: "Namespaces are used for all environments and so this finding is always a false positive"
    - rule_id: "CKV_K8S_153" # Prevent All NGINX Ingress annotation snippets. See CVE-2021-25742.
      path: "**/*"
      reason: "Annotations snippets are used for WAF configuration, as documented by Cloud Platform"
    - rule_id: "CKV2_K8S_6" # Minimize the admission of pods which lack an associated NetworkPolicy
      path: "**/*"
      reason: "NetworkPolicy is configured for the namespace in the cloud-platform-environments repo, so this is a false positive"
    - rule_id: "CKV_DOCKER_2" # Ensure that HEALTHCHECK instructions have been added to container images
      path: "**/*"
      reason: "Healthcheck is not required for k8s, as k8s has its own health check mechanisms"
    - rule_id: "CKV_K8S_43" # Image should use digest
      path: "**/*"
      reason: "Image does use digest, which is references as a variable in the k8s deployment manifest. False positive"
    - rule_id: "CKV_K8S_35" # Prefer using secrets as files over secrets as environment variables
      path: "**/*"
      reason: "Secrets are used as environment variables in this project, and to switch would be significant effort for the minimal gains."

scanners:
  bandit:
    enabled: false
  cdk-nag:
    enabled: false
  cfn-nag:
    enabled: false
  checkov:
    enabled: true
    options:
      frameworks:
        - all
  detect-secrets:
    enabled: false
  grype:
    enabled: true
  npm-audit:
    enabled: false
  opengrep:
    enabled: true
    options:
      config: auto
  semgrep:
    enabled: false
  syft:
    enabled: true
    options:
      cataloging-options:
        - catalog-archives
      additional_outputs:
        - syft-table
        - spdx-json