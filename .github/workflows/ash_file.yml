name: Ash OpenGrep & Checkov Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ash-opengrep-and-checkov:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: OpenGrep Scan
        continue-on-error: true
        uses: semgrep/semgrep-action@v1
        with:
          config: p/default

      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          quiet: true
          soft_fail: true
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Validate Checkov SARIF file
        if: always()
        run: |
          test -f results.sarif
          test -s results.sarif

      - name: Upload Checkov SARIF file
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: results.sarif
          category: checkov-scan

      - name: Upload Checkov SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-scan-report
          path: results.sarif