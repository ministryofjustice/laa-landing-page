name: TruffleHog secret scan

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
  push:
  schedule:
    - cron: "53 0 * * *" # run once a day at 00:53 UTC

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
    - name: TruffleHog scan
      uses: trufflesecurity/trufflehog@f446421baf832d6356c42c1743d99abff52ff334 # 3.95.7
      with:
        version: 3.95.4@sha256:2df7b5f8ec308946dff88927d4a2c3426ebc4efed15fed9c63294e13f3ccbb29
        extra_args: --results=verified
