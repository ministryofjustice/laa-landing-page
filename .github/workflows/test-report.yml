name: Tests

on:
  pull_request:
    types: [ opened, edited, reopened, synchronize ]


permissions:
  contents: read
  actions: read
  checks: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Run Coverage
        run: |
          ./gradlew test
        env:
          GITHUB_ACTOR: ${{ secrets.GITHUB_ACTOR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}

      - name: Parse JaCoCo and Comment on PR
        env:
          # The gh CLI automatically looks for this token to authenticate
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # We grab the PR number directly from the webhook payload
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 1. Parse the XML and generate a markdown file using built-in Python
          python3 -c "
          import xml.etree.ElementTree as ET, os
          
          # Adjust this path if your xml is located elsewhere
          tree = ET.parse('build/reports/jacoco/test/jacocoTestReport.xml')
          counters = [c for c in tree.getroot().findall('counter') if c.get('type') == 'INSTRUCTION']
          
          if counters:
              missed = int(counters[0].get('missed'))
              covered = int(counters[0].get('covered'))
              total = missed + covered
              pct = (covered / total) * 100 if total > 0 else 0
              
              comment_body = f'### 📊 JaCoCo Code Coverage: **{pct:.2f}%**\n'
              
              # Write to the native GitHub Job Summary UI as a backup
              with open(os.environ.get('GITHUB_STEP_SUMMARY', 'summary.md'), 'a') as f:
                  f.write(comment_body)
                  
              # Save it to a temporary text file for the GitHub CLI to read
              with open('coverage_comment.md', 'w') as f:
                  f.write(comment_body)
                  
              # Fail the pipeline if coverage drops below your threshold (e.g., 80%)
              if pct < 80.0:
                  print(f'::error::Coverage ({pct:.2f}%) is below the 80% threshold.')
                  exit(1)
          "

          # 2. Use the native GitHub CLI to post the comment to the PR
          if [ -n "$PR_NUMBER" ]; then
            echo "Posting comment to PR #$PR_NUMBER..."
            gh pr comment "$PR_NUMBER" --body-file coverage_comment.md
          else
            echo "Not running on a Pull Request. Skipping PR comment."
          fi
        
      - name: Fail PR if overall coverage is less than 85%
        if: ${{ steps.jacoco.outputs.coverage-overall < 85 }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          script: |
            core.setFailed('Overall unit test coverage is less than 85%!')    

      - name: Run IntegrationTest
        run: |
          ./gradlew integrationTest

      - name: Run PlaywrightTest
        id: playwright
        continue-on-error: true
        run: |
          APP_PLAYWRIGHT_HEADLESS=true ./gradlew playwrightTest

      - name: Upload Playwright failure artifacts
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: playwright-failures
          path: |
            screenshots/**
            build/playwright-report.html

      - name: Fail job if Playwright tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
