name: Tests

on:
  pull_request:
    types: [ opened, edited, reopened, synchronize ]

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Run Coverage
        run: |
          ./gradlew test
        env:
          GITHUB_ACTOR: ${{ secrets.GITHUB_ACTOR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_TENANT_ID: ${{ secrets.TEST_TENANT_ID }}

      - name: Parse JaCoCo and Comment on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # 1. Fetch the base branch so we can calculate which files changed
          git fetch origin "$BASE_REF" --depth=1
          
          # 2. Get a list of changed Java/Kotlin files
          export CHANGED_FILES=$(git diff --name-only origin/$BASE_REF HEAD | grep -E '\.(java|kt)$' || true)

          # 3. Parse the XML and generate a rich markdown report
          python3 -c "
          import xml.etree.ElementTree as ET, os
          
          tree = ET.parse('build/reports/jacoco/test/jacocoTestReport.xml')
          root = tree.getroot()
          
          # --- OVERALL COVERAGE ---
          overall_counters = [c for c in root.findall('counter') if c.get('type') == 'INSTRUCTION']
          if overall_counters:
              missed = int(overall_counters[0].get('missed'))
              covered = int(overall_counters[0].get('covered'))
              total = missed + covered
              overall_pct = (covered / total) * 100 if total > 0 else 0
          else:
              overall_pct = 0.0

          overall_icon = '🟢' if overall_pct >= 85 else ('🟡' if overall_pct >= 70 else '🔴')
          markdown = f'### {overall_icon} JaCoCo Code Coverage: **{overall_pct:.2f}%**\n\n'

          # --- CHANGED FILES COVERAGE ---
          changed_files_raw = os.environ.get('CHANGED_FILES', '').split()
          # Clean paths to match JaCoCo's internal package/file structure
          changed_files = [f.split('/java/')[-1].split('/kotlin/')[-1] for f in changed_files_raw if '/java/' in f or '/kotlin/' in f]
          
          if changed_files:
              markdown += '#### Changed Files\n'
              markdown += '| File | Coverage | Missed Instructions |\n'
              markdown += '|------|----------|---------------------|\n'
              
              file_found = False
              for pkg in root.findall('package'):
                  pkg_name = pkg.get('name')
                  for sf in pkg.findall('sourcefile'):
                      sf_name = sf.get('name')
                      full_path = f'{pkg_name}/{sf_name}'
                      
                      # If this file was modified in the PR
                      if any(cf.endswith(full_path) for cf in changed_files):
                          file_found = True
                          counters = [c for c in sf.findall('counter') if c.get('type') == 'INSTRUCTION']
                          if counters:
                              f_missed = int(counters[0].get('missed'))
                              f_covered = int(counters[0].get('covered'))
                              f_total = f_missed + f_covered
                              f_pct = (f_covered / f_total) * 100 if f_total > 0 else 0
                              f_icon = '🟢' if f_pct >= 80 else ('🟡' if f_pct >= 50 else '🔴')
                              
                              markdown += f'| `{sf_name}` | {f_icon} {f_pct:.2f}% | {f_missed} |\n'
              
              if not file_found:
                  markdown += '| _No coverage data found for changed files_ | - | - |\n'
          else:
              markdown += '_No Java or Kotlin files were changed in this PR._\n'

          # --- OUTPUT ---
          with open(os.environ.get('GITHUB_STEP_SUMMARY', 'summary.md'), 'a') as f:
              f.write(markdown)
              
          with open('coverage_comment.md', 'w') as f:
              f.write(markdown)

          if overall_pct < 85.0:
              print(f'::error::Overall unit test coverage ({overall_pct:.2f}%) is less than 85%!')
              exit(1)
          "

          # 4. Post the comment to the PR
          if [ -n "$PR_NUMBER" ]; then
            echo "Posting comment to PR #$PR_NUMBER..."
            gh pr comment "$PR_NUMBER" --body-file coverage_comment.md
          else
            echo "Not running on a Pull Request. Skipping PR comment."
          fi     
        
      - name: Run IntegrationTest
        run: |
          ./gradlew integrationTest

      - name: Run PlaywrightTest
        id: playwright
        continue-on-error: true
        run: |
          APP_PLAYWRIGHT_HEADLESS=true ./gradlew playwrightTest

      - name: Upload Playwright failure artifacts
        if: steps.playwright.outcome == 'failure'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: playwright-failures
          path: |
            screenshots/**
            build/playwright-report.html

      - name: Fail job if Playwright tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1