name: ZAP DAST Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *' # runs daily at 2am UTC

jobs:
  zap_scan:
    name: Run ZAP DAST Scan Against Live App
    runs-on: ubuntu-latest

    steps:
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'https://laa-landing-page-dev.apps.live.cloud-platform.service.justice.gov.uk/'
          cmd_options: '-a -j'
          fail_action: false

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
