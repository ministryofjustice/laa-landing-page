name: ZAP DAST Scan

on:
  push:
    branches:
      - main
      - zap-dast-test
  workflow_dispatch:

jobs:
  zap_scan:
    name: Run ZAP DAST Scan
    runs-on: ubuntu-latest

    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '21'

      # Cache Gradle dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Grant execute permission for Gradle wrapper
      - name: Make Gradle executable
        run: chmod +x ./gradlew

      # Start the app in the background
      - name: Start app using bootRun
        run: ./gradlew bootRun &
        env:
          GITHUB_ACTOR: ${{ secrets.GITHUB_ACTOR }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for the app to be ready (in Docker)
        run: |
          echo "Waiting for the app to be ready inside Docker..."
          for i in {1..12}; do
            if docker exec app curl -s http://localhost:8089 > /dev/null; then
              echo "App is up inside container!"
              break
            fi
            echo "Waiting ($i)..."
            sleep 5
          done

      # Run ZAP Baseline scan
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://host.docker.internal:8089'
          cmd_options: '-a -j'

      # Upload the ZAP report
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
