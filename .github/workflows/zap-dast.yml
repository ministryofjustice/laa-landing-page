name: ZAP DAST Scan

on:
  push:
    branches:
      - main
      - zap-dast-test
  workflow_dispatch:

jobs:
  zap_scan:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up JDK
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '21'

      # Cache Gradle dependencies
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Grant Execute Permission for Gradle wrapper (reusing Linter Check)
      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      # Build application JAR (assuming Gradle build file includes all dependencies)
      - name: Build application JAR
        run: ./gradlew build

      # Start application with Docker Compose
      - name: Start application with Docker Compose
        run: |
          docker compose up -d
          echo "Waiting for the app to be ready..."
          for i in {1..10}; do
            curl -s http://localhost:8089 && break || sleep 5
          done

      # Run ZAP Baseline Scan
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:8089'
          cmd_options: '-a -j'

      # Upload ZAP Report
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report*.html
            report*.json

      # Tear down Docker Compose (to keep the runner clean)
      - name: Tear down Docker Compose
        if: always()
        run: docker compose down
