name: ZAP DAST Scan

on:
  push:
    branches:
      - main
      - zap-dast-test
  workflow_dispatch:

jobs:
  zap_scan:
    name: Run ZAP DAST Scan
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up JDK (needed for Gradle build)
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '21'

      # Step 3: Cache Gradle dependencies
      - name: Cache Gradle dependencies
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Step 4: Run Gradle build to ensure the application is ready
      - name: Build the project
        run: ./gradlew build --no-daemon

      # Step 5: Set up Docker Compose (if required for the environment)
      - name: Set up Docker Compose
        run: |
          docker compose up -d
          echo "Waiting for the app to be ready..."
          for i in {1..10}; do
            curl -s http://localhost:8089 && break || sleep 5
          done

      # Step 6: Run ZAP Baseline Scan
      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: 'http://localhost:8089'
          cmd_options: '-a -j'

      # Step 7: Upload ZAP Report as artifact
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_json.json
